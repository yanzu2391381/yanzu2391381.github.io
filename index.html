<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检测报告在线查验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, "Microsoft Yahei", sans-serif;
            background: #fff;
        }
        /* 横幅背景容器 - 调高高度，放大背景展示区域 */
        .banner-wrap {
            width: 100%;
            height: 450px;
            background-image: url("bg.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
        }
        /* 黑色半透明遮罩 */
        .banner-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }
        /* 内容层级高于遮罩 */
        .banner-wrap > * {
            position: relative;
            z-index: 2;
        }
        /* 标题字号缩小 */
        .banner-title {
            font-size: 36px;
            color: #ffffff;
            letter-spacing: 8px;
        }
        #inputCode {
            width: min(92%, 860px);
            height: 80px;
            font-size: 32px;
            padding: 0 24px;
            border: none;
            border-radius: 8px;
        }
        #queryBtn {
            width: min(92%, 860px);
            height: 90px;
            background: #9ed838;
            border: none;
            border-radius: 8px;
            font-size: 44px;
            color: white;
        }
        /* 查询结果区域 */
        .result-area {
            padding: 60px 20px;
            text-align: center;
        }
        #resultText {
            font-size: 36px;
            color: #e62121;
            font-weight: bold;
        }
        .copyright {
            text-align: center;
            padding: 40px 0;
            font-size: 24px;
            color: #444;
        }
    </style>
</head>
<body>
    <!-- 已移除顶部browser-top模块 -->
    <div class="banner-wrap">
        <div class="banner-title">检测报告在线查验</div>
        <input type="text" id="inputCode" placeholder="输入报告编号" value="J2513142258202BR">
        <button id="queryBtn" onclick="checkCode()">查询</button>
    </div>

    <div class="result-area">
        <div id="resultText"></div>
    </div>

    <div class="copyright">证书查询 版权所有</div>

    <script>
        // 有效报告编号列表
        const validCodes = [
            "J2513142258202BR"
        ];

        function checkCode() {
            const inputVal = document.getElementById("inputCode").value.trim();
            const resDom = document.getElementById("resultText");
            if (!inputVal) {
                resDom.innerText = "请输入报告编号";
                return;
            }
            if (validCodes.includes(inputVal)) {
                resDom.innerText = `报告编号为${inputVal}的检测报告存在`;
            } else {
                resDom.innerText = "未查询到该编号对应的检测报告";
            }
        }
    </script>
</body>
</html>
